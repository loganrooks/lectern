name: ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_review:
    types:
      - dismissed
      - submitted
  issue_comment:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-matrix:
    name: verify (${{ matrix.os }})
    if: ${{ github.event_name != 'issue_comment' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: make sync

      - name: Verify
        run: make verify

  verify:
    name: verify
    needs: verify-matrix
    if: ${{ github.event_name != 'issue_comment' && always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.verify-matrix.result }}" != "success" ]; then
            echo "::error::verify matrix failed"
            exit 1
          fi

  codex-review:
    name: codex review
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Require Codex
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CODEX_REVIEWER_LOGIN: chatgpt-codex-connector
        run: python tools/check_codex_review.py

  codex-review-refresh:
    name: refresh codex review
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (
        github.event.comment.user.login == 'chatgpt-codex-connector' ||
        github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
      ) &&
      contains(github.event.comment.body, 'Codex Review:')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh stale Codex review check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          CODEX_REVIEWER_LOGIN: chatgpt-codex-connector
          CODEX_REVIEW_WORKFLOW_ID: ci.yml
          CODEX_REVIEW_JOB_NAME: codex review
        run: python tools/refresh_codex_review_check.py
