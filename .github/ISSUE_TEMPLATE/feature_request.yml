name: Feature Request
description: Propose a capability or workflow improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or project need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What other approaches did you consider?
  - type: textarea
    id: verification
    attributes:
      label: Verification Ideas
      description: How could this be tested or reviewed?
