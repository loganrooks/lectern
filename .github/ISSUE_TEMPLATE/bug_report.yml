name: Bug Report
description: Report reproducible behavior that should change.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest command or steps that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Include relevant command output, excluding secrets or private media.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This report does not include credentials, private media, or sensitive transcripts.
          required: true
